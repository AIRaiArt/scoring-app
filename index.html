<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Judge App</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, runTransaction } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔴 เอา config มาใส่ตรงนี้
const firebaseConfig = {
  apiKey: "ใส่ตรงนี้",
  authDomain: "ใส่ตรงนี้",
  databaseURL: "ใส่ตรงนี้",
  projectId: "ใส่ตรงนี้"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== CONFIG =====
const judges = ['j1','j2','j3','j4'];
let me = prompt("ใส่รหัสกรรมการ (j1-j4)");

const criteria = ['c1','c2','c3','c4','c5'];

// ===== STATE =====
let round = {};
let scores = {};
let temp = {};
let cur = 1;

// ===== INIT =====
async function init(){

  if(!(await get(ref(db,'round'))).exists()){
    await set(ref(db,'round'),{
      phase:'qual',
      contestants:{1:{},2:{},3:{},4:{},5:{}},
      finalists:{}
    });
  }

  onValue(ref(db,'round'), s=>{ round=s.val(); render(); });
  onValue(ref(db,'scores'), s=>{ scores=s.val()||{}; render(); });
}

// ===== LOGIC =====
function done(j,c){
  const sc = scores?.[round.phase]?.[j]?.[c];
  return sc && criteria.every(k=>sc[k]!=null);
}

function allDone(){
  const list = Object.keys(round.phase==='final'?round.finalists:round.contestants);
  return judges.every(j=> list.every(c=>done(j,c)));
}

// ===== UI =====
function render(){

  if(!round.phase) return;

  const list = Object.keys(round.phase==='final'?round.finalists:round.contestants);

  let html = `<h3>${allDone()?'ครบแล้ว':'รอกรรมการ'}</h3>`;

  judges.forEach(j=>{
    let d = list.filter(c=>done(j,c)).length;
    html += `<div>${j}: ${d}/${list.length}</div>`;
  });

  html += `<hr>`;
  list.forEach(c=>{
    const d = done(me,c);
    html += `<button onclick="sel(${c})" style="${d?'background:red':''}">${c}</button>`;
  });

  const lock = done(me,cur);

  html += `<hr>คนที่ ${cur}<br>`;
  criteria.forEach(k=>{
    [1,2,3,4,5].forEach(v=>{
      html += `<button ${lock?'disabled':''} onclick="setScore('${k}',${v})">${v}</button>`;
    });
    html += `<br>`;
  });

  if(!lock){
    html += `<button onclick="save()">บันทึก</button>`;
  }else{
    html += `<div>ล็อคแล้ว</div>`;
  }

  document.body.innerHTML = html;
}

// ===== ACTION =====
window.sel = c=>{
  cur=c;
  temp = scores?.[round.phase]?.[me]?.[c]||{};
  render();
};

window.setScore = (k,v)=>{
  temp[k]=v;
  render();
};

window.save = async ()=>{

  await set(ref(db,`scores/${round.phase}/${me}/${cur}`), temp);

  if(round.phase==='qual'){
    await runTransaction(ref(db,'trigger'),v=>{
      if(v===true) return;
      if(allDone()) return true;
    }).then(async res=>{
      if(res.committed){

        const data = (await get(ref(db,'scores/qual'))).val();
        let sum = {};

        Object.keys(round.contestants).forEach(c=>{
          sum[c]=0;
          judges.forEach(j=>{
            Object.values(data[j]?.[c]||{}).forEach(v=>sum[c]+=v);
          });
        });

        const top = Object.entries(sum).sort((a,b)=>b[1]-a[1]).slice(0,2);

        await update(ref(db,'round'),{
          phase:'final',
          finalists:{[top[0][0]]:{},[top[1][0]]:{}}
        });

        alert("เข้ารอบชิง");
      }
    });
  }
};

init();
</script>
</head>
<body></body>
</html>
